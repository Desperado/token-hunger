# costbench pricing table — USD per 1,000,000 tokens.
#
# THIS IS THE COST CREDIBILITY OF THE TOOL. It lives in the repo, in plain
# text, on purpose: every cost number costbench prints is computed from these
# values, not from a number hidden inside a dependency. If you don't trust a
# figure, you can read exactly where it came from and change it.
#
# Prices change often. Each entry carries a `verified` date — TREAT ANY ENTRY
# AS STALE UNTIL YOU HAVE CHECKED IT against the provider's current price page.
# Updating this file is the single easiest way to contribute: open a PR.
#
# Keys match litellm model ids (provider/model). `input` and `output` are the
# per-1M-token prices for prompt and completion tokens respectively.

