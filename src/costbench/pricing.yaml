# --- Local / self-hosted --- cost is amortized GPU time, NOT a vendor $/token
# price. Distinct basis so the report never blends it silently with vendor rates.
# Override gpu_hourly_rate / throughput_tokens_per_sec for your own hardware via
# the config 'pricing:' block or a per-target 'infra_cost:' field.
local/gemma-27b:
  basis: amortized_gpu
  gpu_hourly_rate: 0.60
  throughput_tokens_per_sec: 2800
  verified: 2026-06-06
  source: https://www.spheron.network/blog/gpu-cost-per-token-benchmark-llm-inference-2026/
  note: "INT4/vLLM continuous batching. batch size 1 worst-case is over-estimate-safe; override gpu_hourly_rate/throughput for your hardware."
local/qwen-coder:
  basis: amortized_gpu
  gpu_hourly_rate: 1.07
  throughput_tokens_per_sec: 60
  verified: 2026-06-06
  source: https://pinggy.io/blog/best_open_source_self_hosted_llms_for_coding/
  note: "Self-hosted, batch size 1 worst-case. Throughput varies wildly by quant/serving stack; override."
