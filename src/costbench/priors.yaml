# ⚠️ ILLUSTRATIVE SEED DATA — these numbers are SYNTHETIC PLACEHOLDERS, not
# measured benchmark results. They exist only to wire `costbench suggest`
# end-to-end. DO NOT cite, publish, or make decisions from these values.
#
# Why synthetic and not real: a model-quality prior is only credible if its
# number comes from a source that actually contains that number. We will not
# bundle a real-looking score attributed to a URL that does not substantiate it
# (e.g. linking a model's HumanEval figure to the human-eval repo, which only
# defines the benchmark). That is the exact "looks sourced but isn't" trap this
# tool exists to expose. So the seed ships clearly labelled as illustrative.
#
# To make this useful: replace each row's metrics with REAL published numbers
# from a source that states them (provider system cards, the benchmark's own
# leaderboard, or a peer-reviewed paper), each with a source URL that contains
# the figure, the benchmark license, and the date you verified it. See
# docs/PRIORS.md for the source policy.
#
# SOURCE POLICY:
#   - Only openly-licensed benchmarks and provider-published system-card numbers
#     belong here, each with a source that actually states the value.
#   - No Artificial Analysis data is bundled or cached — their ToS prohibits
#     republishing. AA is an OPT-IN runtime source only (user's own key).
#   - The only ground truth is the user's own `costbench run`.

