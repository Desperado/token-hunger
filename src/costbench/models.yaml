# costbench model catalog — single source of truth for bundled models.
#
# Keys match LiteLLM model ids (provider/model). Each entry may include:
#   pricing  — USD per 1M tokens (or amortized_gpu for self-hosted)
#   limits   — max_output_tokens / context_window for cost ceilings
#   priors   — illustrative quality seed data for `costbench suggest`
#
# THIS IS THE COST CREDIBILITY OF THE TOOL. Every cost number costbench prints
# is computed from these values. Prices change often — each entry carries a
# `verified` date. TREAT ANY ENTRY AS STALE UNTIL YOU HAVE CHECKED IT against
# the provider's current docs. Updating this file is the easiest way to contribute.
#
# Priors are SYNTHETIC PLACEHOLDERS unless marked otherwise — see docs/PRIORS.md.
# TODO(v2): cache-hit / batch / retry overhead modeling (over-estimate-safe v1).
