# costbench model limits — the worst-case output ceiling per model.
#
# Used by `costbench estimate` to bound output cost when the config does not
# declare a max_tokens. Same source+date discipline as pricing.yaml: every
# entry carries a `verified` date and a `source`. TREAT ANY ENTRY AS STALE
# UNTIL YOU HAVE CHECKED IT against the provider's current docs.
#
# `max_output_tokens` is the over-estimate-safe ceiling we multiply by the
# output price. For unknown models the loader/estimator defaults to 4096.

