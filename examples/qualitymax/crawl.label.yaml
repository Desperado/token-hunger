# Historical prediction benchmark. This does not replay the crawl; it predicts
# the recorded terminal status from the submitted crawl specification.

name: QualityMax - AI crawl outcome prediction

targets:
  - type: model
    id: gemini/gemini-3.1-flash-lite
  - type: model
    id: anthropic/claude-haiku-4-5
  - type: model
    id: openai/gpt-5-mini

task:
  system: >
    Predict the terminal status of this AI crawl from its configuration.
    Reply with exactly one lowercase word: "completed" or "failed".
  prompt_template: "{input}"

check: exact

cases:
  source: file
  # Baked-in demo dump (public-site crawls only) so the hosted box needs no DB.
  # Refresh via scripts/pull_qm_demo.py (runs locally against Supabase REST).
  path: data/qualitymax_crawls.jsonl
  input_field: input
  expect_field: expect
  drop_unlabeled: true
