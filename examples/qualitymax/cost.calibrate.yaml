# Bind real QualityMax crawl-model usage to the crawl benchmark fingerprint.
# Run this after both crawl.pull.yaml and cost.pull.yaml.
#
#   costbench calibrate examples/qualitymax/cost.calibrate.yaml

benchmark: crawl.label.yaml
source: ../../.context/qualitymax_ai_cost_log.jsonl
source_label: qualitymax-ai-cost-log

filters:
  service: crawl

# QualityMax stores served model names without LiteLLM's provider prefix.
# Unknown models are skipped rather than attributed to the wrong target.
target_map:
  claude-haiku-4-5: anthropic/claude-haiku-4-5
  claude-haiku-4-5-20251001: anthropic/claude-haiku-4-5
  gpt-5-mini: openai/gpt-5-mini
  # QualityMax PR #874 swapped the crawl cheap-tier default to Gemini flash-lite;
  # map it so post-swap cost rows are attributed instead of skipped.
  gemini-3.1-flash-lite: gemini/gemini-3.1-flash-lite

fields:
  id: id
  model: model
  input_tokens: input_tokens
  output_tokens: output_tokens
  cost: cost_usd
  timestamp: created_at
