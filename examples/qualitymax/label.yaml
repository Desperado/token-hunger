# HEADLINE benchmark: cost per correct PASS/FAIL verdict.
#
# The ground truth is QualityMax's real historical outcome
# (automation_results.status), so "success" is deterministic and not arguable —
# exactly the property a cost-per-success number needs. The target's job is to
# predict the verdict for each test case; we score the prediction against the
# recorded label off the dump produced by `costbench pull`.
#
#   costbench run examples/qualitymax/label.yaml --report md

name: QualityMax — verdict prediction (cost per correct verdict)

targets:
  - type: model
    id: anthropic/claude-haiku-4-5
  - type: model
    id: openai/gpt-5-mini

  # Add QualityMax itself as a same-field competitor (no home-field advantage):
  # - type: endpoint
  #   id: qualitymax
  #   url: https://app.qualitymax.io/api/v1/predict
  #   auth_env: QUALITYMAX_API_KEY
  #   request_template: { test_case: "{input}" }
  #   response_path: verdict
  #   cost:
  #     basis: per_request
  #     per_request: 0.01

task:
  system: >
    You are predicting whether an automated UI test for the following test case
    will pass or fail when executed. Reply with exactly one lowercase word
    matching the recorded outcome vocabulary: "passed" or "failed".
  prompt_template: "{input}"

# Deterministic: does the model's output contain the recorded verdict? 'contains'
# tests expect ⊆ output, so the prompt above asks the model to emit the same
# words the dump stores (QualityMax statuses like "passed"/"failed"); the match
# is case-insensitive and tolerates extra text. If your statuses use a different
# vocabulary, change the prompt to match it (or swap to a code check).
check: contains

cases:
  source: file
  path: ../../.context/qualitymax_cases.jsonl
  input_field: input
  expect_field: expect          # the deterministic result_status label
  drop_unlabeled: true
